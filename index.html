<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- normalize -->
    <link rel="stylesheet" href="./normalize.css" />
    <!-- default -->
    <link rel="stylesheet" href="./default.css" />
    <!-- main.css -->
    <link rel="stylesheet" href="./main.css" />
    <!-- app.js -->
    <script type="module" src="./app.js"></script>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <main class="page">
      <!-- Title -->
      <section class="title">
        <h1>Rock-Paper-Scissors</h1>
        <div class="title-underline"></div>
      </section>
      <!-- Game Info -->
      <section class="game-info">
        <p class="rule">Just one rule: First to score 5 points wins.</p>
      </section>
      <!-- Game Area -->
      <section class="game-area">
        <!-- Player (Human) -->
        <div class="player" id="human-area">
          <p class="player-name">You</p>
          <div class="choices">
            <button type="button" class="btn" id="rock">✊</button>
            <button type="button" class="btn" id="paper">🖐</button>
            <button type="button" class="btn" id="scissors">✌️</button>
          </div>
          <p>
            Score:
            <span id="human-score">0</span>
          </p>
        </div>
        <!-- Round-Outcome -->
        <div class="round-outcome">
          <p class="status">Start!</p>
          <p class="message">(Go Pick)</p>
        </div>
        <!-- Player (Computer) -->
        <div class="player" id="computer-area">
          <p class="player-name">Computer</p>
          <div class="choices">
            <button type="button" class="btn" disabled>✊</button>
            <button type="button" class="btn" disabled>🖐</button>
            <button type="button" class="btn" disabled>✌️</button>
          </div>
          <p>
            Score:
            <span id="computer-score">0</span>
          </p>
        </div>
      </section>
      <!-- Game Result -->
      <section class="game-result">
        <!-- Game-Outcome -->
        <div class="game-outcome">
          <p class="status">Can you win?</p>
          <p class="message">x-x-x</p>
        </div>
      </section>
      <!-- Game Reset -->
      <section class="game-reset">
        <button type="button" class="btn hidden" id="game-reset-btn">
          Reset Game
        </button>
      </section>
    </main>
  </body>
</html>
